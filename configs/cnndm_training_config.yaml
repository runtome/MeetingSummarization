# Model
model_name: "Qwen/Qwen2.5-7B-Instruct"
max_seq_length: 512   # reduced from 1024 → halves activation memory on P100

# QLoRA quantization
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

# LoRA config
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"

# Training hyperparameters
training:
  output_dir: "./outputs/cnndm"
  num_train_epochs: 1          # 287k samples; 1 epoch is usually enough
  per_device_train_batch_size: 2   # P100 16GB: 8→2 prevents OOM on 152k-vocab logits
  gradient_accumulation_steps: 8   # keeps effective batch size = 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03      # converted to warmup_steps at runtime (ratio × total_steps)
  lr_scheduler_type: "cosine"
  logging_steps: 50
  save_strategy: "steps"
  save_steps: 500
  eval_strategy: "steps"
  eval_steps: 500
  bf16: true
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  max_grad_norm: 0.3

# Data paths & limits
data:
  train_file: "./datasets/train.jsonl"
  val_file: "./datasets/validation.jsonl"
  max_train_samples: 50000    # set null to use full 287k
  max_val_samples: 2000       # set null to use full 13k

# Inference settings
inference:
  max_new_tokens: 256
  temperature: 0.3
  top_p: 0.9
